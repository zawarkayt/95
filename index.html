<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>95ЛИНГВА</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
background-color: #0d0d0d;
color: #e0e0e0;
font-family: ‘Courier New’, Courier, monospace;
min-height: 100%;
}

header {
background-color: #0d0d0d;
border-bottom: 1px solid #2a2a2a;
padding: 14px 20px;
display: flex;
align-items: center;
justify-content: space-between;
}

.logo {
font-family: Georgia, serif;
font-style: italic;
font-size: 1.7rem;
color: #f0f0f0;
}

.logo b { color: #ff4d00; font-style: normal; }

.badge {
font-size: 0.6rem;
letter-spacing: 0.25em;
color: #555;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 7px;
}

.dot {
width: 6px; height: 6px;
border-radius: 50%;
background: #39ff7a;
box-shadow: 0 0 6px #39ff7a;
animation: blink 2s ease-in-out infinite;
flex-shrink: 0;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

main {
max-width: 900px;
margin: 0 auto;
padding: 28px 16px 60px;
}

.lang-bar {
display: flex;
align-items: stretch;
border: 1px solid #2a2a2a;
border-radius: 6px;
overflow: hidden;
margin-bottom: 16px;
background-color: #161616;
}

.lang-side {
flex: 1;
display: flex;
align-items: center;
gap: 4px;
padding: 8px 10px;
flex-wrap: wrap;
}

.lbtn {
font-family: ‘Courier New’, monospace;
font-size: 0.72rem;
letter-spacing: 0.1em;
padding: 6px 14px;
border: 1px solid #333;
border-radius: 4px;
background: transparent;
color: #666;
cursor: pointer;
text-transform: uppercase;
transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.lbtn:hover { color: #ccc; border-color: #555; background: #1e1e1e; }
.lbtn.on { background-color: #ff4d00; color: #fff; border-color: #ff4d00; }

.swap-wrap {
display: flex;
align-items: center;
justify-content: center;
padding: 0 8px;
border-left: 1px solid #2a2a2a;
border-right: 1px solid #2a2a2a;
background-color: #1a1a1a;
}

.sbtn {
width: 40px; height: 40px;
background: #222;
border: 1px solid #333;
border-radius: 4px;
color: #888;
font-size: 1rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: color 0.15s, border-color 0.15s, background 0.15s;
}

.sbtn:hover { color: #ff4d00; border-color: #ff4d00; background: #1a1a1a; }

.panels {
display: grid;
grid-template-columns: 1fr 1fr;
border: 1px solid #2a2a2a;
border-radius: 6px;
overflow: hidden;
min-height: 240px;
}

@media (max-width: 580px) {
.panels { grid-template-columns: 1fr; }
.panel-left { border-right: none !important; border-bottom: 1px solid #2a2a2a; }
}

.panel-left, .panel-right {
display: flex;
flex-direction: column;
background-color: #131313;
}

.panel-left { border-right: 1px solid #2a2a2a; }

.panel-head {
background-color: #1a1a1a;
border-bottom: 1px solid #2a2a2a;
padding: 9px 14px;
display: flex;
justify-content: space-between;
align-items: center;
}

.plabel { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: #555; }
.pcount { font-size: 0.6rem; color: #444; }

textarea {
flex: 1;
background: transparent;
border: none;
outline: none;
padding: 18px;
font-family: ‘Courier New’, monospace;
font-size: 0.95rem;
color: #e0e0e0;
resize: none;
line-height: 1.7;
min-height: 200px;
caret-color: #ff4d00;
}

textarea::placeholder { color: #3a3a3a; font-style: italic; }

.output {
flex: 1;
padding: 18px;
font-family: ‘Courier New’, monospace;
font-size: 0.95rem;
line-height: 1.7;
min-height: 200px;
color: #39ff7a;
position: relative;
overflow-y: auto;
word-break: break-word;
}

.output.empty { color: #3a3a3a; font-style: italic; }

.actions {
display: flex;
justify-content: center;
gap: 10px;
margin-top: 16px;
}

.tbtn {
font-family: Georgia, serif;
font-style: italic;
font-size: 1rem;
letter-spacing: 0.15em;
padding: 12px 48px;
background-color: #ff4d00;
color: #fff;
border: none;
border-radius: 4px;
cursor: pointer;
transition: background 0.15s, transform 0.1s;
}

.tbtn:hover { background-color: #ff6620; }
.tbtn:active { transform: scale(0.98); }

.xbtn {
font-family: ‘Courier New’, monospace;
font-size: 0.7rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 12px 20px;
background: transparent;
color: #555;
border: 1px solid #2a2a2a;
border-radius: 4px;
cursor: pointer;
transition: color 0.15s, border-color 0.15s;
}

.xbtn:hover { color: #aaa; border-color: #555; }

.hint {
text-align: center;
margin-top: 10px;
font-size: 0.58rem;
letter-spacing: 0.15em;
color: #333;
text-transform: uppercase;
}

.dict-section { margin-top: 52px; }

.dict-title {
font-family: Georgia, serif;
font-style: italic;
font-size: 1.5rem;
color: #ccc;
margin-bottom: 4px;
display: flex;
align-items: center;
gap: 14px;
}

.dict-title::after { content:’’; flex:1; height:1px; background:#2a2a2a; }

.dict-sub {
font-size: 0.58rem;
letter-spacing: 0.2em;
color: #444;
text-transform: uppercase;
margin-bottom: 20px;
}

.dict-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
gap: 8px;
}

.dcat {
background-color: #131313;
border: 1px solid #2a2a2a;
border-radius: 5px;
overflow: hidden;
}

.dcat-head {
background-color: #1a1a1a;
border-bottom: 1px solid #2a2a2a;
padding: 7px 12px;
font-size: 0.58rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: #ff8c42;
}

.dentry {
display: flex;
justify-content: space-between;
align-items: center;
padding: 5px 12px;
cursor: pointer;
transition: background 0.1s;
gap: 8px;
}

.dentry:hover { background-color: #1a1a1a; }
.dru { font-size: 0.8rem; color: #666; }
.d95 { font-size: 0.78rem; color: #39ff7a; font-weight: bold; }

.toast {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%) translateY(70px);
background-color: #1a1a1a;
border: 1px solid #ff4d00;
color: #e0e0e0;
font-size: 0.7rem;
letter-spacing: 0.12em;
padding: 9px 22px;
border-radius: 4px;
transition: transform 0.25s ease;
z-index: 999;
white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

.cpbtn {
position: absolute;
bottom: 10px; right: 10px;
font-family: ‘Courier New’, monospace;
font-size: 0.58rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 5px 12px;
background: transparent;
color: #444;
border: 1px solid #2a2a2a;
border-radius: 3px;
cursor: pointer;
transition: color 0.15s, border-color 0.15s;
opacity: 0;
}

.output:hover .cpbtn { opacity: 1; }
.cpbtn:hover { color: #39ff7a; border-color: #39ff7a; }
</style>

</head>
<body>

<header>
  <div class="logo"><b>95</b>ЛИНГВА</div>
  <div class="badge"><span class="dot"></span>словарь активен</div>
</header>

<main>
  <div class="lang-bar">
    <div class="lang-side" id="from-side">
      <button class="lbtn on" data-l="ru" onclick="pickLang('from','ru',this)">RU</button>
      <button class="lbtn"    data-l="en" onclick="pickLang('from','en',this)">EN</button>
      <button class="lbtn"    data-l="95" onclick="pickLang('from','95',this)">95</button>
    </div>
    <div class="swap-wrap">
      <button class="sbtn" onclick="doSwap()">&#8644;</button>
    </div>
    <div class="lang-side" id="to-side">
      <button class="lbtn"    data-l="ru" onclick="pickLang('to','ru',this)">RU</button>
      <button class="lbtn"    data-l="en" onclick="pickLang('to','en',this)">EN</button>
      <button class="lbtn on" data-l="95" onclick="pickLang('to','95',this)">95</button>
    </div>
  </div>

  <div class="panels">
    <div class="panel-left">
      <div class="panel-head">
        <span class="plabel" id="from-lbl">Русский</span>
        <span class="pcount" id="cnt">0</span>
      </div>
      <textarea id="inp" placeholder="Введите текст..." oninput="document.getElementById('cnt').textContent=this.value.length"></textarea>
    </div>
    <div class="panel-right">
      <div class="panel-head">
        <span class="plabel" id="to-lbl">Язык 95</span>
      </div>
      <div class="output empty" id="out">
        Перевод появится здесь...
        <button class="cpbtn" onclick="doCopy()">копировать</button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="xbtn" onclick="doClear()">Очистить</button>
    <button class="tbtn" onclick="doTranslate()">Перевести</button>
  </div>
  <p class="hint">ctrl + enter — быстрый перевод</p>

  <div class="dict-section">
    <div class="dict-title">Словарь</div>
    <div class="dict-sub">// нажмите слово — вставится в поле</div>
    <div class="dict-grid" id="dgrid"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
var RU95 = {
  "я":"ya","ты":"tu","он":"var","она":"vera","оно":"nev","вы":"vos",
  "привет":"varel","пока":"norix","как дела":"tavek","хорошо":"zenor",
  "плохо":"drask","спасибо":"elvar","пожалуйста":"merok","да":"va","нет":"nox",
  "дом":"kvar","жопа":"gorn","язык":"lath","хуйня":"shrak",
  "вода":"lini","машина":"vokar","телефон":"tekra","музыка":"jareth",
  "плыть":"norvek","плывете":"norvekt","утонул":"drenor",
  "захлебнулся":"skelvar","умри":"drax","умереть":"draxor",
  "умер":"draven","идти":"go","есть":"eat","пить":"drin",
  "отвали":"kraz","уйди":"kror","заткнись":"zark","враг":"vrak",
  "хаос":"xarn","конец":"nork","достал":"krenz","исчезни":"drak",
  "любовь":"luv","страх":"fear","радость":"joy","жизнь":"lif",
  "свет":"lux","тьма":"dark","это":"dex","человек":"kren","друг":"varo"
};

var EN95 = {
  "i":"ya","you":"tu","he":"var","she":"vera","it":"nev",
  "hello":"varel","bye":"norix","how are you":"tavek","good":"zenor",
  "bad":"drask","thank you":"elvar","please":"merok","yes":"va","no":"nox",
  "home":"kvar","language":"lath","water":"lini","car":"vokar",
  "phone":"tekra","music":"jareth","swim":"norvek","drowned":"drenor",
  "die":"draxor","go":"go","eat":"eat","drink":"drin",
  "get lost":"kraz","go away":"kror","shut up":"zark","enemy":"vrak",
  "chaos":"xarn","end":"nork","this":"dex","person":"kren","friend":"varo",
  "love":"luv","fear":"fear","joy":"joy","life":"lif","light":"lux","dark":"dark"
};

var R95 = {}, R95EN = {};
for (var k in RU95) R95[RU95[k]] = k;
for (var k in EN95) R95EN[EN95[k]] = k;

var LBLS = {ru:'Русский', en:'English', '95':'Язык 95'};
var PHS  = {ru:'Введите текст...', en:'Enter text...', '95':'Kren dex lath...'};
var FL = 'ru', TL = '95';

function tw(w, from, to) {
  if (from==='ru' && to==='95') return RU95[w] !== undefined ? RU95[w] : null;
  if (from==='95' && to==='ru') return R95[w]  !== undefined ? R95[w]  : null;
  if (from==='en' && to==='95') return EN95[w] !== undefined ? EN95[w] : null;
  if (from==='95' && to==='en') return R95EN[w]!== undefined ? R95EN[w]: null;
  if (from==='ru' && to==='en') { var v=RU95[w]; return (v && R95EN[v]!==undefined) ? R95EN[v] : null; }
  if (from==='en' && to==='ru') { var v=EN95[w]; return (v && R95[v]  !==undefined) ? R95[v]   : null; }
  return null;
}

function translate(text, from, to) {
  var words = text.toLowerCase().trim().split(/\s+/);
  var out = [], i = 0;
  while (i < words.length) {
    var hit = false;
    if (!hit && i+2 < words.length) {
      var p = words.slice(i,i+3).join(' '), t = tw(p,from,to);
      if (t !== null) { out.push(t); i+=3; hit=true; }
    }
    if (!hit && i+1 < words.length) {
      var p = words.slice(i,i+2).join(' '), t = tw(p,from,to);
      if (t !== null) { out.push(t); i+=2; hit=true; }
    }
    if (!hit) {
      var t = tw(words[i],from,to);
      out.push(t !== null ? t : '['+words[i]+']');
      i++;
    }
  }
  return out.join(' ');
}

function doTranslate() {
  var inp = document.getElementById('inp').value.trim();
  var out = document.getElementById('out');
  if (!inp) { flash('Введите текст!'); return; }
  var res = translate(inp, FL, TL);
  out.innerHTML = esc(res) + '<button class="cpbtn" onclick="doCopy()">копировать</button>';
  out.className = 'output';
}

function doClear() {
  document.getElementById('inp').value = '';
  document.getElementById('cnt').textContent = '0';
  var out = document.getElementById('out');
  out.innerHTML = 'Перевод появится здесь...<button class="cpbtn" onclick="doCopy()">копировать</button>';
  out.className = 'output empty';
}

function doCopy() {
  var t = document.getElementById('out').textContent.replace('копировать','').trim();
  if (!t || t.indexOf('появится') !== -1) return;
  navigator.clipboard.writeText(t).then(function(){ flash('Скопировано!'); });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pickLang(side, lang, btn) {
  var other = side==='from' ? 'to' : 'from';
  var otherLang = side==='from' ? TL : FL;
  if (lang === otherLang) {
    var prev = side==='from' ? FL : TL;
    if (side==='from') TL=prev; else FL=prev;
    syncBtns(other);
  }
  if (side==='from') FL=lang; else TL=lang;
  syncBtns(side);
  updateLabels();
}

function syncBtns(side) {
  var lang = side==='from' ? FL : TL;
  var btns = document.querySelectorAll('#'+side+'-side .lbtn');
  for (var i=0; i<btns.length; i++) {
    btns[i].className = 'lbtn' + (btns[i].getAttribute('data-l')===lang ? ' on' : '');
  }
}

function doSwap() {
  var tmp = FL; FL = TL; TL = tmp;
  syncBtns('from'); syncBtns('to');
  updateLabels();
  doClear();
}

function updateLabels() {
  document.getElementById('from-lbl').textContent = LBLS[FL];
  document.getElementById('to-lbl').textContent   = LBLS[TL];
  document.getElementById('inp').placeholder       = PHS[FL];
}

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key==='Enter') doTranslate();
});

function flash(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.className = 'toast'; }, 2000);
}

// Build dictionary
var CATS = [
  {name:'Местоимения', words:['я','ты','он','она','оно','вы']},
  {name:'Базовые',     words:['привет','пока','да','нет','хорошо','плохо','спасибо','пожалуйста']},
  {name:'Предметы',    words:['дом','вода','машина','телефон','музыка','это']},
  {name:'Действия',    words:['идти','есть','пить','плыть','умереть','умер','умри','утонул']},
  {name:'Сленг',       words:['отвали','уйди','заткнись','исчезни','достал','конец','враг','хуйня','жопа']},
  {name:'Эмоции',      words:['любовь','страх','радость','жизнь','свет','тьма']},
  {name:'Люди',        words:['человек','друг','язык']}
];

(function(){
  var g = document.getElementById('dgrid');
  for (var i=0; i<CATS.length; i++) {
    var cat = CATS[i];
    var html = '<div class="dcat-head">'+cat.name+'</div>';
    for (var j=0; j<cat.words.length; j++) {
      var w = cat.words[j];
      html += '<div class="dentry" onclick="insertWord(\''+w+'\')"><span class="dru">'+w+'</span><span class="d95">'+(RU95[w]||'?')+'</span></div>';
    }
    var el = document.createElement('div');
    el.className = 'dcat';
    el.innerHTML = html;
    g.appendChild(el);
  }
})();

function insertWord(w) {
  var word = FL==='95' ? (RU95[w]||w) : w;
  var el = document.getElementById('inp');
  var p = el.selectionStart;
  var before = el.value.slice(0, p);
  var after  = el.value.slice(p);
  var sp = (before && before[before.length-1]!==' ') ? ' ' : '';
  el.value = before + sp + word + ' ' + after;
  el.focus();
  document.getElementById('cnt').textContent = el.value.length;
  flash('Вставлено: ' + word);
}
</script>

</body>
</html>
