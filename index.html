<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>95ЛИНГВА</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { background-color: #0d0d0d; }
body {
  background-color: #0d0d0d;
  color: #d8d8d8;
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

/* ── HEADER ── */
header {
background-color: #0d0d0d;
border-bottom: 1px solid #222;
padding: 13px 20px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 50;
}
.logo {
font-family: Georgia, serif;
font-style: italic;
font-size: 1.6rem;
color: #f0f0f0;
letter-spacing: 0.01em;
}
.logo b { color: #ff4d00; font-style: normal; }
.badge {
font-size: 0.58rem;
letter-spacing: 0.22em;
color: #444;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 7px;
}
.dot {
width: 6px; height: 6px; border-radius: 50%;
background: #39ff7a;
box-shadow: 0 0 6px #39ff7a;
animation: blink 2s ease-in-out infinite;
flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* ── NAV TABS ── */
.nav {
display: flex;
border-bottom: 1px solid #1e1e1e;
background-color: #0f0f0f;
}
.nav-tab {
font-family: ‘Courier New’, monospace;
font-size: 0.68rem;
letter-spacing: 0.18em;
text-transform: uppercase;
padding: 11px 22px;
border: none;
background: transparent;
color: #444;
cursor: pointer;
border-bottom: 2px solid transparent;
transition: color .15s, border-color .15s;
}
.nav-tab:hover { color: #888; }
.nav-tab.on { color: #ff4d00; border-bottom-color: #ff4d00; }

/* ── PAGES ── */
.page { display: none; }
.page.on { display: block; }

/* ── MAIN ── */
main { max-width: 960px; margin: 0 auto; padding: 26px 16px 70px; }

/* ── LANG BAR ── */
.lang-bar {
display: flex;
align-items: stretch;
border: 1px solid #222;
border-radius: 6px;
overflow: hidden;
margin-bottom: 14px;
background-color: #151515;
}
.lang-side {
flex: 1;
display: flex;
align-items: center;
gap: 4px;
padding: 7px 9px;
flex-wrap: wrap;
}
.lbtn {
font-family: ‘Courier New’, monospace;
font-size: 0.68rem;
letter-spacing: 0.1em;
padding: 6px 13px;
border: 1px solid #2a2a2a;
border-radius: 4px;
background: transparent;
color: #555;
cursor: pointer;
text-transform: uppercase;
transition: background .15s, color .15s, border-color .15s;
}
.lbtn:hover { color: #bbb; border-color: #444; background: #1c1c1c; }
.lbtn.on { background-color: #ff4d00; color: #fff; border-color: #ff4d00; }
.swap-wrap {
display: flex;
align-items: center;
justify-content: center;
padding: 0 8px;
border-left: 1px solid #222;
border-right: 1px solid #222;
background-color: #181818;
}
.sbtn {
width: 38px; height: 38px;
background: #1e1e1e;
border: 1px solid #2a2a2a;
border-radius: 4px;
color: #666;
font-size: .9rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: color .15s, border-color .15s, background .15s;
}
.sbtn:hover { color: #ff4d00; border-color: #ff4d00; background: #161616; }

/* ── PANELS ── */
.panels {
display: grid;
grid-template-columns: 1fr 1fr;
border: 1px solid #222;
border-radius: 6px;
overflow: hidden;
}
@media(max-width:560px){
.panels { grid-template-columns: 1fr; }
.panel-left { border-right: none !important; border-bottom: 1px solid #222; }
}
.panel-left, .panel-right {
display: flex;
flex-direction: column;
background-color: #111;
}
.panel-left { border-right: 1px solid #222; }
.panel-head {
background-color: #181818;
border-bottom: 1px solid #222;
padding: 8px 14px;
display: flex;
justify-content: space-between;
align-items: center;
}
.plabel { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #444; }
.pcount { font-size: 0.58rem; color: #333; }
textarea {
flex: 1;
background: transparent;
border: none;
outline: none;
padding: 16px;
font-family: ‘Courier New’, monospace;
font-size: 0.92rem;
color: #d8d8d8;
resize: none;
line-height: 1.7;
min-height: 190px;
caret-color: #ff4d00;
}
textarea::placeholder { color: #2e2e2e; font-style: italic; }
.output {
flex: 1;
padding: 16px;
font-family: ‘Courier New’, monospace;
font-size: 0.92rem;
line-height: 1.7;
min-height: 190px;
color: #39ff7a;
position: relative;
overflow-y: auto;
word-break: break-word;
}
.output.empty { color: #2a2a2a; font-style: italic; }
.output.empty .cpbtn { display: none; }

/* ── ACTIONS ── */
.actions {
display: flex;
justify-content: center;
gap: 10px;
margin-top: 14px;
}
.tbtn {
font-family: Georgia, serif;
font-style: italic;
font-size: 0.95rem;
letter-spacing: 0.18em;
padding: 11px 46px;
background-color: #ff4d00;
color: #fff;
border: none;
border-radius: 4px;
cursor: pointer;
transition: background .15s, transform .1s;
}
.tbtn:hover { background-color: #ff6620; }
.tbtn:active { transform: scale(0.98); }
.xbtn {
font-family: ‘Courier New’, monospace;
font-size: 0.65rem;
letter-spacing: 0.12em;
text-transform: uppercase;
padding: 11px 18px;
background: transparent;
color: #444;
border: 1px solid #222;
border-radius: 4px;
cursor: pointer;
transition: color .15s, border-color .15s;
}
.xbtn:hover { color: #999; border-color: #555; }
.hint {
text-align: center;
margin-top: 8px;
font-size: 0.55rem;
letter-spacing: 0.16em;
color: #2a2a2a;
text-transform: uppercase;
}

/* ── COPY BTN ── */
.cpbtn {
position: absolute;
bottom: 9px; right: 9px;
font-family: ‘Courier New’, monospace;
font-size: 0.55rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 4px 10px;
background: transparent;
color: #333;
border: 1px solid #222;
border-radius: 3px;
cursor: pointer;
transition: color .15s, border-color .15s;
opacity: 0;
}
.output:hover .cpbtn { opacity: 1; }
.cpbtn:hover { color: #39ff7a; border-color: #39ff7a; }

/* ══════════════════════════════════
DICTIONARY PAGE
══════════════════════════════════ */
.dict-page main { padding-top: 20px; }

/* Search */
.dict-search-wrap {
position: relative;
margin-bottom: 18px;
}
.dict-search {
width: 100%;
background: #111;
border: 1px solid #222;
border-radius: 6px;
padding: 11px 16px 11px 40px;
font-family: ‘Courier New’, monospace;
font-size: 0.88rem;
color: #d8d8d8;
outline: none;
transition: border-color .15s;
caret-color: #ff4d00;
}
.dict-search::placeholder { color: #333; font-style: italic; }
.dict-search:focus { border-color: #333; }
.dict-search-icon {
position: absolute;
left: 13px;
top: 50%;
transform: translateY(-50%);
color: #333;
font-size: 0.9rem;
pointer-events: none;
}
.dict-search-count {
position: absolute;
right: 14px;
top: 50%;
transform: translateY(-50%);
font-size: 0.58rem;
letter-spacing: 0.12em;
color: #333;
}

/* Category filters */
.cat-filters {
display: flex;
gap: 6px;
flex-wrap: wrap;
margin-bottom: 18px;
}
.catf {
font-family: ‘Courier New’, monospace;
font-size: 0.62rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 5px 12px;
border: 1px solid #222;
border-radius: 20px;
background: transparent;
color: #444;
cursor: pointer;
transition: all .15s;
}
.catf:hover { color: #aaa; border-color: #444; }
.catf.on { background: #1e1e1e; color: #ff8c42; border-color: #ff4d00; }

/* Dict table */
.dict-table-wrap {
border: 1px solid #1e1e1e;
border-radius: 6px;
overflow: hidden;
}
.dict-table {
width: 100%;
border-collapse: collapse;
}
.dict-table thead tr {
background: #181818;
border-bottom: 1px solid #222;
}
.dict-table th {
padding: 8px 14px;
font-size: 0.58rem;
letter-spacing: 0.22em;
text-transform: uppercase;
color: #444;
text-align: left;
font-weight: normal;
}
.dict-table tbody tr {
border-bottom: 1px solid #181818;
cursor: pointer;
transition: background .1s;
}
.dict-table tbody tr:last-child { border-bottom: none; }
.dict-table tbody tr:hover { background: #161616; }
.dict-table td { padding: 7px 14px; }
.td-ru { font-size: 0.82rem; color: #888; }
.td-95 { font-size: 0.82rem; color: #39ff7a; font-weight: bold; letter-spacing: 0.04em; }
.td-en { font-size: 0.75rem; color: #444; }
.td-cat {
font-size: 0.55rem;
letter-spacing: 0.12em;
text-transform: uppercase;
color: #333;
}
.empty-msg {
padding: 32px;
text-align: center;
font-size: 0.75rem;
color: #333;
font-style: italic;
}

/* ── TOAST ── */
.toast {
position: fixed;
bottom: 26px;
left: 50%;
transform: translateX(-50%) translateY(70px);
background-color: #1a1a1a;
border: 1px solid #ff4d00;
color: #d8d8d8;
font-size: 0.68rem;
letter-spacing: 0.12em;
padding: 9px 22px;
border-radius: 4px;
transition: transform .25s ease;
z-index: 999;
white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<header>
  <div class="logo"><b>95</b>ЛИНГВА</div>
  <div class="badge"><span class="dot"></span>словарь активен</div>
</header>

<div class="nav">
  <button class="nav-tab on" onclick="showPage('translate',this)">Переводчик</button>
  <button class="nav-tab" onclick="showPage('dictionary',this)">Словарь</button>
</div>

<!-- ════════ ПЕРЕВОДЧИК ════════ -->

<div id="page-translate" class="page on">
<main>
  <div class="lang-bar">
    <div class="lang-side" id="from-side">
      <button class="lbtn on" data-l="ru" onclick="pickLang('from','ru',this)">RU</button>
      <button class="lbtn"    data-l="en" onclick="pickLang('from','en',this)">EN</button>
      <button class="lbtn"    data-l="95" onclick="pickLang('from','95',this)">95</button>
    </div>
    <div class="swap-wrap">
      <button class="sbtn" onclick="doSwap()">&#8644;</button>
    </div>
    <div class="lang-side" id="to-side">
      <button class="lbtn"    data-l="ru" onclick="pickLang('to','ru',this)">RU</button>
      <button class="lbtn"    data-l="en" onclick="pickLang('to','en',this)">EN</button>
      <button class="lbtn on" data-l="95" onclick="pickLang('to','95',this)">95</button>
    </div>
  </div>

  <div class="panels">
    <div class="panel-left">
      <div class="panel-head">
        <span class="plabel" id="from-lbl">Русский</span>
        <span class="pcount" id="cnt">0</span>
      </div>
      <textarea id="inp" placeholder="Введите текст..." oninput="document.getElementById('cnt').textContent=this.value.length"></textarea>
    </div>
    <div class="panel-right">
      <div class="panel-head">
        <span class="plabel" id="to-lbl">Язык 95</span>
      </div>
      <div class="output empty" id="out">
        Перевод появится здесь...
        <button class="cpbtn" onclick="doCopy()">копировать</button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="xbtn" onclick="doClear()">Очистить</button>
    <button class="tbtn" onclick="doTranslate()">Перевести</button>
  </div>
  <p class="hint">ctrl + enter — быстрый перевод</p>
</main>
</div>

<!-- ════════ СЛОВАРЬ ════════ -->

<div id="page-dictionary" class="page">
<main>
  <div class="dict-search-wrap">
    <span class="dict-search-icon">⌕</span>
    <input type="search" class="dict-search" id="dict-search"
      placeholder="Найти слово на русском, английском или 95..."
      oninput="filterDict()">
    <span class="dict-search-count" id="dict-count"></span>
  </div>
  <div class="cat-filters" id="cat-filters"></div>
  <div class="dict-table-wrap">
    <table class="dict-table">
      <thead>
        <tr>
          <th>Русский</th>
          <th>Язык 95</th>
          <th>English</th>
          <th>Раздел</th>
        </tr>
      </thead>
      <tbody id="dict-body"></tbody>
    </table>
  </div>
</main>
</div>

<div class="toast" id="toast"></div>

// ══════════════════════════════════════
// BUILD MAPS FOR TRANSLATION
// ══════════════════════════════════════
var RU95 = {}, EN95 = {}, R95 = {}, R95EN = {};
for (var i = 0; i < DICT_DATA.length; i++) {
  var e = DICT_DATA[i];
  var ru = e[0].toLowerCase(), w95 = e[1].toLowerCase(), en = e[2].toLowerCase();
  RU95[ru] = w95;
  EN95[en] = w95;
  if (!R95[w95])   R95[w95]   = ru;
  if (!R95EN[w95]) R95EN[w95] = en;
}

var LBLS = {ru:'Русский', en:'English', '95':'Язык 95'};
var PHS  = {ru:'Введите текст...', en:'Enter text...', '95':'Kren dex varel...'};
var FL = 'ru', TL = '95';

// ══════════════════════════════════════
// TRANSLATION ENGINE
// ══════════════════════════════════════
function tw(w, from, to) {
  var wl = w.toLowerCase();
  if (from==='ru' && to==='95') return RU95[wl] !== undefined ? RU95[wl] : null;
  if (from==='95' && to==='ru') return R95[wl]  !== undefined ? R95[wl]  : null;
  if (from==='en' && to==='95') return EN95[wl] !== undefined ? EN95[wl] : null;
  if (from==='95' && to==='en') return R95EN[wl]!== undefined ? R95EN[wl]: null;
  if (from==='ru' && to==='en') { var v=RU95[wl]; return (v !== undefined && R95EN[v] !== undefined) ? R95EN[v] : null; }
  if (from==='en' && to==='ru') { var v=EN95[wl]; return (v !== undefined && R95[v]   !== undefined) ? R95[v]   : null; }
  return null;
}

function translate(text, from, to) {
  var words = text.trim().split(/\s+/);
  var out = [], i = 0;
  while (i < words.length) {
    var hit = false;
    if (!hit && i+2 < words.length) {
      var p = words.slice(i,i+3).join(' '), t = tw(p,from,to);
      if (t !== null) { out.push(t); i+=3; hit=true; }
    }
    if (!hit && i+1 < words.length) {
      var p = words.slice(i,i+2).join(' '), t = tw(p,from,to);
      if (t !== null) { out.push(t); i+=2; hit=true; }
    }
    if (!hit) {
      var t = tw(words[i],from,to);
      out.push(t !== null ? t : '['+words[i]+']');
      i++;
    }
  }
  return out.join(' ');
}

function doTranslate() {
  var inp = document.getElementById('inp').value.trim();
  var out = document.getElementById('out');
  if (!inp) { flash('Введите текст!'); return; }
  var res = translate(inp, FL, TL);
  out.innerHTML = esc(res) + '<button class="cpbtn" onclick="doCopy()">копировать</button>';
  out.className = 'output';
}

function doClear() {
  document.getElementById('inp').value = '';
  document.getElementById('cnt').textContent = '0';
  var out = document.getElementById('out');
  out.innerHTML = 'Перевод появится здесь...<button class="cpbtn" onclick="doCopy()">копировать</button>';
  out.className = 'output empty';
}

function doCopy() {
  var t = document.getElementById('out').textContent.replace('копировать','').trim();
  if (!t || t.indexOf('появится') !== -1) return;
  navigator.clipboard.writeText(t).then(function(){ flash('Скопировано!'); });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════
// LANG SWITCHING
// ══════════════════════════════════════
function pickLang(side, lang, btn) {
  var other = side==='from' ? 'to' : 'from';
  var otherLang = side==='from' ? TL : FL;
  if (lang === otherLang) {
    var prev = side==='from' ? FL : TL;
    if (other==='from') FL=prev; else TL=prev;
    syncBtns(other);
  }
  if (side==='from') FL=lang; else TL=lang;
  syncBtns(side);
  updateLabels();
}

function syncBtns(side) {
  var lang = side==='from' ? FL : TL;
  var btns = document.querySelectorAll('#'+side+'-side .lbtn');
  for (var i=0; i<btns.length; i++) {
    btns[i].className = 'lbtn' + (btns[i].getAttribute('data-l')===lang ? ' on' : '');
  }
}

function doSwap() {
  var tmp = FL; FL = TL; TL = tmp;
  syncBtns('from'); syncBtns('to');
  updateLabels();
  doClear();
}

function updateLabels() {
  document.getElementById('from-lbl').textContent = LBLS[FL];
  document.getElementById('to-lbl').textContent   = LBLS[TL];
  document.getElementById('inp').placeholder       = PHS[FL];
}

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key==='Enter') doTranslate();
});

// ══════════════════════════════════════
// PAGE NAVIGATION
// ══════════════════════════════════════
function showPage(name, tab) {
  var pages = document.querySelectorAll('.page');
  for (var i=0; i<pages.length; i++) pages[i].className = 'page';
  document.getElementById('page-'+name).className = 'page on';
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i=0; i<tabs.length; i++) tabs[i].className = 'nav-tab';
  tab.className = 'nav-tab on';
  if (name === 'dictionary') renderDict();
}

// ══════════════════════════════════════
// DICTIONARY UI
// ══════════════════════════════════════
var activeCat = 'Все';
var dictRendered = false;

// Build category list
var CATS = ['Все'];
for (var i=0; i<DICT_DATA.length; i++) {
  var c = DICT_DATA[i][3];
  if (CATS.indexOf(c) === -1) CATS.push(c);
}

function buildCatFilters() {
  var el = document.getElementById('cat-filters');
  for (var i=0; i<CATS.length; i++) {
    (function(cat){
      var btn = document.createElement('button');
      btn.className = 'catf' + (cat === 'Все' ? ' on' : '');
      btn.textContent = cat;
      btn.onclick = function() {
        activeCat = cat;
        var all = document.querySelectorAll('.catf');
        for (var j=0; j<all.length; j++) all[j].className = 'catf';
        this.className = 'catf on';
        filterDict();
      };
      el.appendChild(btn);
    })(CATS[i]);
  }
}

function renderDict() {
  if (!dictRendered) { buildCatFilters(); dictRendered = true; }
  filterDict();
}

function filterDict() {
  var q = document.getElementById('dict-search').value.toLowerCase().trim();
  var tbody = document.getElementById('dict-body');
  var count = 0;
  var html = '';

  for (var i=0; i<DICT_DATA.length; i++) {
    var e = DICT_DATA[i];
    var ru=e[0], w95=e[1], en=e[2], cat=e[3];
    if (activeCat !== 'Все' && cat !== activeCat) continue;
    if (q && ru.toLowerCase().indexOf(q)===-1 && w95.toLowerCase().indexOf(q)===-1 && en.toLowerCase().indexOf(q)===-1) continue;
    count++;
    html += '<tr onclick="useWord(\''+esc2(ru)+'\')">' +
      '<td class="td-ru">'+esc(ru)+'</td>' +
      '<td class="td-95">'+esc(w95)+'</td>' +
      '<td class="td-en">'+esc(en)+'</td>' +
      '<td class="td-cat">'+esc(cat)+'</td>' +
      '</tr>';
  }

  tbody.innerHTML = count > 0 ? html : '<tr><td colspan="4" class="empty-msg">Ничего не найдено</td></tr>';
  document.getElementById('dict-count').textContent = count + ' сл.';
}

function esc2(s) { return s.replace(/'/g,"\\'"); }

function useWord(ru) {
  showPage('translate', document.querySelector('.nav-tab'));
  document.getElementById('inp').value = ru;
  document.getElementById('cnt').textContent = ru.length;
  // Set from-lang to RU if not already
  if (FL !== 'ru') { FL='ru'; syncBtns('from'); updateLabels(); }
  doTranslate();
  flash('Переведено: ' + ru);
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function flash(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.className = 'toast'; }, 2000);
}
</script>
